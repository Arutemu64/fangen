# Exclude a variety of commonly ignored directories.

exclude = [
  ".bzr",
  ".direnv",
  ".eggs",
  ".git",
  ".git-rewrite",
  ".hg",
  ".ipynb_checkpoints",
  ".mypy_cache",
  ".nox",
  ".pants.d",
  ".pyenv",
  ".pytest_cache",
  ".pytype",
  ".ruff_cache",
  ".svn",
  ".tox",
  ".venv",
  ".vscode",
  "__pypackages__",
  "_build",
  "buck-out",
  "build",
  "dist",
  "node_modules",
  "site-packages",
  "venv"
]
# Same as Black.
line-length = 88
indent-width = 4
# Assume Python 3.13
target-version = "py313"

[format]
# Like Black, use double quotes for strings.
quote-style = "double"
# Like Black, indent with spaces, rather than tabs.
indent-style = "space"
# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false
# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"
# Enable auto-formatting of code examples in docstrings. Markdown,
# reStructuredText code/literal blocks and doctests are all supported.
#
# This is currently disabled by default, but it is planned for this
# to be opt-out in the future.
docstring-code-format = false
# Set the line length limit used when formatting code snippets in
# docstrings.
#
# This only has an effect when the `docstring-code-format` setting is
# enabled.
docstring-code-line-length = "dynamic"

[lint]
select = ["ALL"]
ignore = [
  # Formatter conflicts. Ruff explicitly recommends disabling these when the
  # formatter is enabled, otherwise the linter and formatter fight each other.
  "COM812", # missing-trailing-comma
  "ISC001", # single-line-implicit-string-concatenation

  # Docstrings are not required for this small private, internal tool.
  "D", # pydocstyle

  # The codebase intentionally contains Cyrillic text in strings, docstrings
  # and comments, so the ambiguous-unicode checks are pure noise here. Only
  # the ambiguous-character rules are silenced; the rest of RUF stays on.
  "RUF001", # ambiguous-unicode-character-string
  "RUF002", # ambiguous-unicode-character-docstring
  "RUF003", # ambiguous-unicode-character-comment

  # Complexity/size thresholds are subjective and were already effectively
  # disabled via the previous blanket "PLR" ignore. They are relaxed
  # deliberately; the rest of PLR (e.g. PLR2004 magic values) stays on.
  "C901",    # complex-structure
  "PLR0911", # too-many-return-statements
  "PLR0912", # too-many-branches
  "PLR0913", # too-many-arguments

  # TODO bookkeeping we don't enforce (authors/links). Well-formedness rules
  # such as TD004/TD005 stay on.
  "FIX002", # line-contains-todo
  "TD002",  # missing-todo-author
  "TD003",  # missing-todo-link

  # `from rich import print` deliberately shadows the builtin.
  "A004", # builtin-import-shadowing

  # Naive datetimes are intentional: file mtimes and the parsed update_time
  # are compared as local, tz-naive values.
  "DTZ006", # call-datetime-fromtimestamp
  "DTZ007", # call-datetime-strptime-without-zone
]
# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []
# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
